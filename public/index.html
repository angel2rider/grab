<style>
  /* ═══════════════════════════════════════════════
     FLEXOKI  ·  Steph Ango's inky color system
     ═══════════════════════════════════════════════ */
  :root {
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    --transition-fast: 0.15s var(--ease-out);
    --transition-base: 0.25s var(--ease-out);
    --transition-slow: 0.5s var(--ease-out);
    --radius-xl: 24px;
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  /* ── Dark (Flexoki) ── */
  [data-theme="dark"] {
    --bg:        #1C1B1A;
    --bg-2:      #282726;
    --bg-3:      #343331;
    --border:    rgba(64, 62, 60, 0.55);
    --divider:   rgba(64, 62, 60, 0.35);
    --text:      #E6E4D9;
    --text-2:    #B7B5AC;
    --muted:     #878580;
    --dim:       #6F6E69;
    --accent:    #2D8B46;
    --accent-h:  #236B36;
    --accent-bg: rgba(45, 139, 70, 0.10);
    --accent-glow: rgba(45, 139, 70, 0.16);
    --danger:    #D14D41;
    --danger-bg: rgba(209, 77, 65, 0.10);
    --ok:        #879A39;
    --ok-bg:     rgba(135, 154, 57, 0.10);
    --input-bg:  rgba(40, 38, 36, 0.55);
    --input-border: rgba(64, 62, 60, 0.40);
    --seg-bg:    rgba(52, 51, 49, 0.35);
    --seg-active: rgba(64, 62, 60, 0.40);
    --scrollbar: rgba(111, 110, 105, 0.18);
    --glass-bg:  rgba(28, 27, 26, 0.45);
    --glass-border: rgba(64, 62, 60, 0.30);
    --glass-glow: rgba(45, 139, 70, 0.06);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
    --shadow-md: 0 8px 32px rgba(0,0,0,0.28);
    --shadow-lg: 0 25px 60px rgba(0,0,0,0.60), 0 0 0 0.5px rgba(36,131,123,0.06);
  }

  /* ── Light (Flexoki) ── */
  [data-theme="light"] {
    --bg:        #FFFCF0;
    --bg-2:      #F2F0E5;
    --bg-3:      #E6E4D9;
    --border:    rgba(206, 205, 195, 0.60);
    --divider:   rgba(206, 205, 195, 0.45);
    --text:      #100F0F;
    --text-2:    #575653;
    --muted:     #878580;
    --dim:       #9F9D96;
    --accent:    #2D8B46;
    --accent-h:  #236B36;
    --accent-bg: rgba(45, 139, 70, 0.08);
    --accent-glow: rgba(45, 139, 70, 0.10);
    --danger:    #D14D41;
    --danger-bg: rgba(209, 77, 65, 0.06);
    --ok:        #66800B;
    --ok-bg:     rgba(102, 128, 11, 0.06);
    --input-bg:  rgba(242, 240, 229, 0.65);
    --input-border: rgba(206, 205, 195, 0.50);
    --seg-bg:    rgba(230, 228, 217, 0.50);
    --seg-active: rgba(255, 252, 240, 0.75);
    --scrollbar: rgba(159, 157, 150, 0.16);
    --glass-bg:  rgba(255, 252, 240, 0.50);
    --glass-border: rgba(206, 205, 195, 0.40);
    --glass-glow: rgba(45, 139, 70, 0.04);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-md: 0 8px 32px rgba(0,0,0,0.06);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    overflow: clip;
    background: var(--bg);
    transition: background 0.6s var(--ease-out);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ═══════════════════════════════════════════════
     APP WINDOW · Glassmorphism
     ═══════════════════════════════════════════════ */
  .app-window {
    position: relative; z-index: 1;
    width: 90vw; max-width: 660px;
    height: auto; max-height: 88vh; max-height: 88dvh;
    display: flex; flex-direction: column;
    background: var(--glass-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 0.5px solid var(--glass-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: windowIn 0.55s var(--ease-spring);
    transition: background 0.5s var(--ease-out), border-color 0.5s var(--ease-out), box-shadow 0.5s var(--ease-out);
  }
  .app-window::before {
    content: "";
    position: absolute; inset: 0; pointer-events: none; z-index: -1;
    border-radius: var(--radius-xl);
    padding: 1px;
    background: linear-gradient(135deg, var(--glass-glow), transparent 40%, transparent 60%, var(--glass-glow));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    transition: opacity 0.5s var(--ease-out);
  }
  @keyframes windowIn {
    from { opacity: 0; transform: scale(0.95) translateY(16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Header ── */
  .window-header {
    height: 50px; min-height: 50px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
    border-bottom: 0.5px solid var(--divider);
    transition: background 0.5s var(--ease-out), border-color 0.5s var(--ease-out);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 13px;
    color: var(--text); text-decoration: none;
    flex-shrink: 0; opacity: 0.85;
    transition: opacity 0.2s var(--ease-out), transform 0.2s var(--ease-spring);
  }
  .brand:hover { opacity: 1; transform: translateY(-0.5px); }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 50%;
    flex-shrink: 0; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: transform 0.2s var(--ease-spring), box-shadow 0.2s var(--ease-out);
  }
  @media (hover: hover) {
    .brand:hover .brand-mark {
      transform: scale(1.08);
      box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    }
  }
  .brand-mark img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── Theme toggle ── */
  .theme-toggle {
    border: none; cursor: pointer;
    background: transparent; color: var(--muted);
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s var(--ease-out); flex-shrink: 0;
    font-family: inherit; font-size: 15px;
  }
  @media (hover: hover) {
    .theme-toggle:hover {
      color: var(--text);
      background: rgba(128,128,128,0.08);
      transform: scale(1.08);
    }
  }
  .theme-toggle:active { transform: scale(0.94); }

  /* ═══════════════════════════════════════════════
     HERO / SEARCH
     ═══════════════════════════════════════════════ */
  .hero-section {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 0 20px; text-align: center;
    animation: fadeDown 0.5s var(--ease-out) 0.1s both;
    transition: padding 0.3s var(--ease-out);
  }
  .hero-section.has-results .hero-title,
  .hero-section.has-results .hero-subtitle { display: none; }
  .hero-section.has-results { padding-top: 16px; padding-bottom: 10px; }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-title {
    font-size: 20px; font-weight: 700;
    color: var(--text); margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .hero-subtitle {
    font-size: 11px; color: var(--muted); font-weight: 400;
    margin-bottom: 22px; letter-spacing: 0.02em;
  }

  .hero-search {
    width: 100%; max-width: 540px;
    display: flex; align-items: center;
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: var(--radius-md);
    padding: 5px 5px 5px 16px;
    transition: all 0.25s var(--ease-out);
  }
  .hero-search:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
    transform: scale(1.008);
  }
  .hero-search.collapsed { padding-right: 16px; }
  .hero-search input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: 13px;
    font-weight: 500; padding: 12px 10px; min-width: 0;
  }
  .hero-search input::placeholder { color: var(--dim); font-weight: 400; }

  .grab-btn-wrap { display: flex; padding: 0; margin: 0; flex-shrink: 0; }
  .grab-btn-wrap .btn-grab,
  .dl-bar #dlBtnSlot .btn-grab {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 600; font-size: 12px;
    padding: 10px 20px; border-radius: 50px;
    color: var(--bg);
    background: var(--accent);
    transition: all 0.2s var(--ease-spring);
    white-space: nowrap;
  }
  @media (hover: hover) {
    .grab-btn-wrap .btn-grab:hover,
    .dl-bar #dlBtnSlot .btn-grab:hover {
      background: var(--accent-h);
      transform: translateY(-1.5px) scale(1.03);
      box-shadow: 0 6px 20px var(--accent-glow);
    }
  }
  .grab-btn-wrap .btn-grab:active,
  .dl-bar #dlBtnSlot .btn-grab:active { transform: scale(0.95) translateY(0); transition: all 0.08s ease; }
  .grab-btn-wrap .btn-grab:disabled,
  .dl-bar #dlBtnSlot .btn-grab:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; animation: none; }

  .dl-bar #dlBtnSlot { margin-top: 12px; }
  .dl-bar #dlBtnSlot .btn-grab {
    width: 100%; font-size: 13px; padding: 14px 28px;
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.25), 0 0 40px rgba(255, 255, 255, 0.12);
    animation: btnAura 2.5s ease-in-out infinite;
  }
  @keyframes btnAura {
    0%, 100% { box-shadow: 0 0 16px rgba(255, 255, 255, 0.22), 0 0 32px rgba(255, 255, 255, 0.08); }
    50%      { box-shadow: 0 0 28px rgba(255, 255, 255, 0.38), 0 0 56px rgba(255, 255, 255, 0.18); }
  }

  /* ── Spinner ── */
  .spinner {
    width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: inline-block;
    flex-shrink: 0;
  }
  [data-theme="light"] .spinner {
    border-color: rgba(0,0,0,0.10);
    border-top-color: var(--accent);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══════════════════════════════════════════════
     CONTENT
     ═══════════════════════════════════════════════ */
  .window-content {
    flex: 1; overflow-y: auto; padding: 24px;
    transition: padding 0.3s var(--ease-out);
  }
  .window-content::-webkit-scrollbar { width: 10px; }
  .window-content::-webkit-scrollbar-track { background: transparent; }
  .window-content::-webkit-scrollbar-thumb {
    background: var(--scrollbar); border: 2px solid transparent;
    background-clip: padding-box; border-radius: 99px;
  }

  /* ── Error ── */
  .error {
    background: var(--danger-bg); border: 0.5px solid rgba(209,77,65,0.15);
    color: var(--danger); padding: 12px 16px; border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 500; margin-bottom: 16px; display: none;
    animation: fadeUp 0.3s var(--ease-out);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .error.show { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Result card ── */
  #result { margin-top: 2px; }
  .card {
    background: var(--bg-3);
    border: 0.5px solid var(--divider);
    border-radius: var(--radius-lg);
    overflow: hidden;
    animation: cardIn 0.45s var(--ease-spring);
    transition: all 0.3s var(--ease-out);
  }
  @media (hover: hover) {
    .card:hover {
      border-color: var(--border);
      transform: translateY(-1.5px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.10);
    }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-grid { display: grid; grid-template-columns: 1fr; }
  .thumb-box {
    position: relative; aspect-ratio: 16/9; width: 100%;
    background: var(--bg); overflow: hidden;
    transition: transform 0.4s var(--ease-out);
  }
  .thumb-box img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.5s var(--ease-out);
  }
  @media (hover: hover) {
    .card:hover .thumb-box { transform: scale(1.01); }
    .card:hover .thumb-box img { transform: scale(1.05); }
  }
  .duration-pill {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: #fff; font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 50px;
    font-family: inherit; letter-spacing: 0.02em;
  }
  .result-body { padding: 20px 22px; display: flex; flex-direction: column; }

  .source-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 9px; font-weight: 600; padding: 3px 9px;
    border-radius: 50px; background: var(--accent-bg);
    color: var(--accent); margin-bottom: 10px; width: fit-content;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .source-pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .source-pill .arrow { opacity: 0.55; text-transform: none; }

  .matched-note {
    font-size: 10px; color: var(--muted); background: var(--accent-bg);
    border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 10px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }

  .result-body h2 {
    font-weight: 600; font-size: 18px; line-height: 1.35;
    margin-bottom: 6px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  .meta-row {
    display: flex; flex-wrap: wrap; gap: 2px 8px;
    color: var(--muted); font-size: 10px; margin-bottom: 12px;
  }
  .meta-row .item { display: flex; align-items: center; gap: 3px; }
  .meta-row .sep { color: var(--dim); }

  /* ── Format selectors ── */
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field-label {
    font-size: 9px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .seg {
    display: inline-flex; gap: 1px; background: var(--seg-bg);
    border-radius: 50px; padding: 3px; width: fit-content;
    border: 0.5px solid var(--divider);
  }
  .seg button {
    border: none; cursor: pointer; background: transparent;
    color: var(--muted); font-family: inherit; font-weight: 500;
    font-size: 11px; padding: 5px 14px; border-radius: 50px;
    transition: all 0.2s var(--ease-out);
  }
  @media (hover: hover) {
    .seg button:hover { color: var(--text); }
  }
  .seg button.active {
    background: var(--seg-active); color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .seg button:active { transform: scale(0.95); }

  .select-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* ═══════════════════════════════════════════════
     CUSTOM DROPDOWN · glassmorphism + themed
     ═══════════════════════════════════════════════ */
  .select { position: relative; width: 100%; }

  /* Native select — hidden, only for form semantics / a11y */
  .select select.custom-select-native {
    position: absolute; opacity: 0; pointer-events: none;
    width: 100%; height: 100%; top: 0; left: 0;
  }

  /* Visible trigger button */
  .custom-select-trigger {
    display: flex; align-items: center; gap: 8px;
    width: 100%;
    background: var(--input-bg);
    border: 0.5px solid var(--divider);
    border-radius: var(--radius-xs);
    color: var(--text);
    font-family: inherit; font-size: 11px; font-weight: 500;
    padding: 8px 28px 8px 10px; cursor: pointer;
    transition: all 0.2s var(--ease-out);
    text-align: left; letter-spacing: 0;
    position: relative;
  }
  @media (hover: hover) {
    .custom-select-trigger:hover { border-color: var(--border); }
  }
  .custom-select-trigger:focus-visible {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .custom-select.open .custom-select-trigger {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }

  .custom-select-label {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Chevron arrow */
  .custom-select-chevron {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px; flex-shrink: 0;
    color: var(--muted);
    transition: transform 0.25s var(--ease-spring);
  }
  .custom-select.open .custom-select-chevron {
    transform: translateY(-50%) rotate(180deg);
  }

  /* Dropdown panel — portal to body */
  .custom-select-dropdown {
    position: fixed;
    z-index: 2000;
    background: var(--glass-bg);
    backdrop-filter: blur(32px) saturate(200%);
    -webkit-backdrop-filter: blur(32px) saturate(200%);
    border: 0.5px solid var(--glass-border);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    padding: 4px;
    min-width: 120px;
    max-height: 240px;
    overflow-y: auto;
    overflow-x: hidden;
    transform-origin: top center;
    opacity: 0;
    transform: scale(0.92) translateY(-4px);
    pointer-events: none;
    transition: opacity 0.18s var(--ease-out),
                transform 0.22s var(--ease-spring);
  }
  .custom-select-dropdown.open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }

  /* Dropdown scrollbar */
  .custom-select-dropdown::-webkit-scrollbar { width: 5px; }
  .custom-select-dropdown::-webkit-scrollbar-track { background: transparent; }
  .custom-select-dropdown::-webkit-scrollbar-thumb {
    background: var(--scrollbar);
    border-radius: 99px;
  }

  /* Individual option */
  .custom-select-option {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-xs);
    font-family: inherit; font-size: 11px; font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s var(--ease-out);
    white-space: nowrap;
  }
  @media (hover: hover) {
    .custom-select-option:hover {
      background: var(--accent-bg);
      color: var(--text);
    }
  }
  .custom-select-option.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
  }
  .custom-select-option .opt-check {
    width: 14px; height: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.12s var(--ease-out);
  }
  .custom-select-option.active .opt-check { opacity: 1; }
  .custom-select-option .opt-check svg {
    width: 12px; height: 12px; color: var(--accent);
  }

  /* Invisible backdrop to catch outside clicks */
  .custom-select-backdrop {
    position: fixed; inset: 0; z-index: 1999;
    pointer-events: none;
  }
  .custom-select-backdrop.active { pointer-events: auto; }

  /* ── Download bar ── */
  .dl-bar {
    display: flex; flex-direction: column; gap: 10px;
    padding-top: 12px; border-top: 0.5px solid var(--divider);
    margin-top: auto;
  }
  .dl-info { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .dl-info b { color: var(--text); font-weight: 600; }
  .dl-info .codec-tag {
    display: inline-block; font-size: 9px; font-weight: 600;
    background: var(--accent-bg); color: var(--accent);
    padding: 1px 6px; border-radius: 50px; margin-left: 4px;
  }

  /* ═══════════════════════════════════════════════
     PROGRESS RING (SVG Circular)
     ═══════════════════════════════════════════════ */
  .progress-ring-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 4px 0;
    animation: fadeUp 0.35s var(--ease-out);
  }
  .progress-ring-container {
    position: relative; width: 80px; height: 80px;
    flex-shrink: 0;
  }
  .progress-ring-svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .progress-ring-track {
    fill: none;
    stroke: var(--seg-bg);
    stroke-width: 4;
  }
  .progress-ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.4s var(--ease-out), stroke 0.6s var(--ease-out);
  }
  .progress-ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .progress-ring-pct {
    font-size: 17px; font-weight: 700;
    color: var(--text); font-family: inherit;
    transition: color 0.3s var(--ease-out);
  }
  .progress-ring-step {
    font-size: 10px; font-weight: 500;
    color: var(--muted); text-align: center;
    transition: color 0.3s var(--ease-out);
    max-width: 200px; line-height: 1.4;
  }
  .progress-ring-meta {
    display: flex; gap: 12px; font-size: 10px; color: var(--dim);
    min-height: 14px; align-items: center;
  }
  .progress-ring-eta { margin-left: auto; }

  /* Checkmark on complete */
  .progress-ring-check {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.5);
    transition: all 0.4s var(--ease-spring);
  }
  .progress-ring-check.show {
    opacity: 1; transform: scale(1);
  }
  .progress-ring-check svg {
    width: 32px; height: 32px;
  }
  .progress-ring-check path {
    fill: none; stroke: var(--ok); stroke-width: 3;
    stroke-linecap: round; stroke-linejoin: round;
    stroke-dasharray: 100; stroke-dashoffset: 100;
    animation: checkDraw 0.5s var(--ease-out) 0.15s forwards;
  }
  @keyframes checkDraw { to { stroke-dashoffset: 0; } }

  /* Completion message */
  .dl-complete {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--ok); font-weight: 500;
    animation: fadeUp 0.35s var(--ease-out);
    flex-wrap: wrap; justify-content: center;
  }
  .dl-complete .dl-filename {
    color: var(--text); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; max-width: 160px;
  }
  .dl-complete .dl-filesize { color: var(--dim); font-size: 10px; }
  .dl-error { font-size: 11px; color: var(--danger); font-weight: 500; text-align: center; }

  /* ═══════════════════════════════════════════════
     MULTI-ITEM
     ═══════════════════════════════════════════════ */
  .multi-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 0.5px solid var(--divider);
  }
  .multi-head h3 {
    font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .multi-count {
    font-size: 10px; color: var(--muted); background: var(--seg-bg);
    padding: 2px 9px; border-radius: 50px; font-weight: 500;
  }
  .btn-link {
    border: none; cursor: pointer; background: transparent;
    color: var(--accent); font-family: inherit; font-weight: 500;
    font-size: 11px; padding: 4px 10px; border-radius: 50px;
    transition: all 0.2s var(--ease-out);
  }
  @media (hover: hover) {
    .btn-link:hover { background: var(--accent-bg); transform: translateY(-0.5px); }
  }

  .multi-options {
    padding: 10px 18px; border-bottom: 0.5px solid var(--divider);
    display: grid; grid-template-columns: auto 1fr; gap: 8px 18px; align-items: center;
  }
  .multi-options .field { flex-direction: row; align-items: center; gap: 8px; }

  .item-list { max-height: 300px; overflow-y: auto; }
  .item-list::-webkit-scrollbar { width: 6px; }
  .item-list::-webkit-scrollbar-thumb {
    background: var(--scrollbar); border: 1px solid transparent;
    background-clip: padding-box; border-radius: 99px;
  }
  .item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px; cursor: pointer;
    transition: background 0.12s var(--ease-out), opacity 0.2s var(--ease-out);
  }
  @media (hover: hover) {
    .item-row:hover { background: var(--bg-3); }
  }
  .item-row.unavailable { opacity: 0.3; cursor: default; }
  .item-row.unavailable .item-title::after {
    content: " — no match"; color: var(--danger); font-size: 9px; font-weight: 500;
  }
  .item-check {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1.5px solid var(--border); flex-shrink: 0;
    display: grid; place-items: center;
    transition: all 0.2s var(--ease-out);
    color: transparent; font-size: 9px; font-weight: 700;
  }
  .item-check.checked {
    border-color: var(--accent); background: var(--accent); color: var(--bg);
    box-shadow: 0 0 0 2px var(--accent-bg);
  }
  .item-thumb {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--seg-bg); overflow: hidden; flex-shrink: 0;
  }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-info { flex: 1; min-width: 0; }
  .item-title {
    font-size: 11px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .item-dur { font-size: 10px; color: var(--dim); flex-shrink: 0; }

  .multi-foot {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px; border-top: 0.5px solid var(--divider);
  }
  .selected-count { font-size: 11px; color: var(--muted); flex: 1; font-weight: 500; }
  .btn-primary {
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 600; font-size: 11px; padding: 8px 18px;
    border-radius: 50px; color: var(--bg);
    background: var(--accent); display: flex; align-items: center; gap: 6px;
    transition: all 0.2s var(--ease-spring);
  }
  @media (hover: hover) {
    .btn-primary:hover { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 4px 14px var(--accent-glow); }
  }
  .btn-primary:active { transform: scale(0.96); }
  .btn-primary:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

  /* ── Skeleton ── */
  .skeleton {
    background: var(--bg-3); border: 0.5px solid var(--divider);
    border-radius: var(--radius-lg); overflow: hidden; padding: 24px;
    animation: cardIn 0.4s var(--ease-out);
  }
  .skel {
    background: linear-gradient(90deg, var(--seg-bg) 25%, var(--bg-2) 37%, var(--seg-bg) 63%);
    background-size: 400% 100%; animation: shimmer 1.4s ease infinite;
    border-radius: var(--radius-xs);
  }
  @keyframes shimmer { to { background-position: -100% 0; } }
  .skel-line { height: 11px; margin-bottom: 8px; }
  .skel-line.short { width: 48%; }

  /* ═══════════════════════════════════════════════
     BOIDS CANVAS · full-screen
     ═══════════════════════════════════════════════ */
  #boidsCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: 0.50; transition: opacity 0.8s var(--ease-out);
  }
  [data-theme="light"] #boidsCanvas { opacity: 0.28; }

  /* ── Footer ── */
  .window-footer {
    padding: 10px 20px 14px; text-align: center;
    border-top: 0.5px solid var(--divider);
    color: var(--dim); font-size: 10px;
    transition: background 0.5s var(--ease-out), border-color 0.5s var(--ease-out);
  }

  /* ═══════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════ */
  @media (max-width: 768px) {
    body { overflow-y: auto; align-items: flex-start; padding: 12px 0; }
    .app-window {
      width: calc(100vw - 24px); max-height: none;
      border-radius: var(--radius-lg);
    }
    .window-content { padding: 16px; }
    .window-header { padding: 0 16px; gap: 10px; height: 46px; }
    .brand-mark { width: 24px; height: 24px; }
    .hero-section { padding: 28px 0 14px; }
    .hero-title { font-size: 18px; }
    .hero-subtitle { font-size: 10px; margin-bottom: 18px; }
    .hero-search { border-radius: var(--radius-md); padding: 4px 4px 4px 14px; }
    .hero-search input { font-size: 13px; padding: 12px 8px; }
    .grab-btn-wrap .btn-grab { padding: 10px 18px; font-size: 12px; }
    .result-grid { grid-template-columns: 1fr; }
    .thumb-box { aspect-ratio: 16/9; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .result-body { padding: 16px; }
    .progress-ring-container { width: 68px; height: 68px; }
  }
  @media (max-width: 480px) {
    body { overflow-y: auto; align-items: flex-start; padding: 8px 0; }
    .app-window { width: calc(100vw - 8px); border-radius: var(--radius-md); }
    .window-content { padding: 10px; }
    .window-header { padding: 0 10px; gap: 8px; height: 44px; }
    .brand span { display: none; }
    .brand-mark { width: 22px; height: 22px; }
    .theme-toggle { width: 32px; height: 32px; }
    .hero-section { padding: 18px 0 8px; }
    .hero-title { font-size: 15px; }
    .hero-subtitle { font-size: 10px; margin-bottom: 12px; }
    .hero-search { padding: 2px 2px 2px 10px; }
    .hero-search input { font-size: 16px; padding: 12px 6px; } /* 16px prevents iOS zoom */
    .grab-btn-wrap .btn-grab { padding: 12px 16px; font-size: 13px; min-height: 44px; }
    .result-grid { grid-template-columns: 1fr; }
    .thumb-box { aspect-ratio: 16/9; border-radius: var(--radius-md) var(--radius-md) 0 0; }
    .result-body { padding: 12px 14px; }
    .result-body h2 { font-size: 15px; }

    /* Touch-friendly selects */
    .select-row { grid-template-columns: 1fr; }
    .custom-select-trigger { font-size: 13px; padding: 11px 30px 11px 12px; min-height: 44px; }
    .custom-select-dropdown { min-width: 100px; max-height: 220px; }
    .custom-select-option { padding: 12px 14px; font-size: 13px; min-height: 44px; }

    /* Touch-friendly seg buttons */
    .seg { width: 100%; }
    .seg button { flex: 1; text-align: center; padding: 9px 14px; font-size: 12px; min-height: 44px; }

    /* Multi-item touch */
    .multi-options { grid-template-columns: 1fr; padding: 8px 10px; }
    .multi-head { padding: 10px 12px; }
    .multi-head h3 { font-size: 12px; }
    .item-row { padding: 10px 12px; gap: 8px; }
    .item-check { width: 24px; height: 24px; font-size: 11px; }
    .item-thumb { width: 36px; height: 36px; }
    .item-title { font-size: 12px; }
    .item-sub { font-size: 10px; }
    .multi-foot { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
    .btn-primary { padding: 12px 18px; font-size: 12px; min-height: 44px; }
    .btn-link { font-size: 12px; padding: 8px 14px; min-height: 44px; display: flex; align-items: center; }

    /* DL button full-width on mobile */
    .dl-bar #dlBtnSlot .btn-grab { font-size: 14px; padding: 14px 24px; min-height: 48px; }

    .dl-complete .dl-filename { max-width: 100px; }
    .progress-ring-container { width: 64px; height: 64px; }
    .progress-ring-pct { font-size: 15px; }
    .window-footer { padding: 8px 12px; font-size: 9px; }
  }

  /* ═══════════════════════════════════════════════
     ACCESSIBILITY
     ═══════════════════════════════════════════════ */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    #boidsCanvas { display: none; }
  }
</style>
</head>
<body>

  <canvas id="boidsCanvas"></canvas>

  <div class="app-window">
    <header class="window-header">
      <a class="brand" href="/">
        <div class="brand-mark">
          <img src="https://png.pngtree.com/png-vector/20230315/ourmid/pngtree-pirate-logo-icon-design-illustration-skull-pirates-tattoo-vector-png-image_50797142.jpg" alt="Grab" width="22" height="22" referrerpolicy="no-referrer" />
        </div>
        <span>Grab</span>
      </a>
      <div style="flex:1"></div>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">◐</button>
    </header>

    <main class="window-content">
      <div class="hero-section">
        <h1 class="hero-title">Grab</h1>
        <p class="hero-subtitle">Paste a link. Download media.</p>
        <form class="hero-search" id="searchForm" onsubmit="return false">
          <input id="urlInput" type="text" placeholder="youtube.com/watch?v=..." autocomplete="off" spellcheck="false" aria-label="Video URL" />
          <div class="grab-btn-wrap" id="grabBtnWrap">
            <button class="btn-grab" type="submit" id="goBtn" form="searchForm">Grab</button>
          </div>
        </form>
      </div>
      <div class="error" id="error"></div>
      <div id="result"></div>
    </main>

    <footer class="window-footer">
      yt-dlp + ffmpeg
    </footer>
  </div>

  <script src="boids.js?v=8" defer></script>
  <script src="app.js?v=33" defer></script>
</body>
</html>
