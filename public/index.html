<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grab — fast media downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@400;500&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface-2: #f1f3f4;
    --surface-3: #e8eaed;
    --border: #dadce0;
    --border-light: #e8eaed;
    --text: #202124;
    --text-2: #3c4043;
    --muted: #5f6368;
    --dim: #80868b;
    --accent: #1a73e8;
    --accent-hover: #1765cc;
    --accent-soft: #e8f0fe;
    --danger: #d93025;
    --danger-soft: #fce8e6;
    --ok: #1e8e3e;
    --ok-soft: #e6f4ea;
    --warn: #ea8600;
    --warn-soft: #fef7e0;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.08), 0 1px 3px 1px rgba(60,64,67,0.06);
    --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.12), 0 2px 6px 2px rgba(60,64,67,0.08);
    --shadow-3: 0 4px 8px 0 rgba(60,64,67,0.12), 0 6px 16px 4px rgba(60,64,67,0.06);
    --topbar-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Roboto", "Google Sans", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    padding: 0 24px;
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: "Google Sans", sans-serif;
    font-weight: 600; font-size: 22px;
    color: var(--text); letter-spacing: -0.01em;
    flex-shrink: 0;
  }
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #ea4335, #fbbc04, #34a853, #4285f4, #ea4335);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .brand-mark::after {
    content: ""; width: 14px; height: 14px;
    border-radius: 50%; background: var(--surface);
  }
  .topbar-search {
    flex: 1;
    max-width: 620px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 0 12px;
    height: 44px;
    transition: all 0.18s;
  }
  .topbar-search:focus-within {
    background: var(--surface);
    border-color: var(--accent);
    box-shadow: var(--shadow-2);
  }
  .topbar-search .search-icon {
    width: 18px; height: 18px;
    color: var(--dim); flex-shrink: 0;
  }
  .topbar-search input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: inherit; font-size: 15px;
    padding: 0 4px;
  }
  .topbar-search input::placeholder { color: var(--dim); }
  .topbar-search .btn-search {
    border: none; cursor: pointer;
    font-family: "Google Sans", sans-serif;
    font-weight: 500; font-size: 14px;
    padding: 8px 20px;
    border-radius: var(--radius-xs);
    color: white;
    background: var(--accent);
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .topbar-search .btn-search:hover { background: var(--accent-hover); box-shadow: var(--shadow-1); }
  .topbar-search .btn-search:disabled { opacity: 0.5; cursor: default; }
  .topbar-end { flex-shrink: 0; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Layout ---------- */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* ---------- Empty state ---------- */
  .empty-state {
    text-align: center;
    padding: 80px 24px 40px;
  }
  .empty-state .empty-icon {
    width: 64px; height: 64px; margin: 0 auto 24px;
    color: var(--surface-3);
  }
  .empty-state h2 {
    font-family: "Google Sans", sans-serif;
    font-size: 22px; font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p {
    color: var(--muted); font-size: 15px;
    max-width: 420px; margin: 0 auto 28px;
    line-height: 1.5;
  }
  .empty-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
  }
  .empty-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    box-shadow: var(--shadow-1);
  }
  .empty-chip .chip-dot {
    width: 10px; height: 10px;
    border-radius: 50%; flex-shrink: 0;
  }

  /* ---------- Error ---------- */
  .error {
    background: var(--danger-soft);
    border: 1px solid #f5c6cb;
    color: var(--danger);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .error.show { display: block; }

  /* ---------- Result ---------- */
  #result { margin-top: 24px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-1);
    overflow: hidden;
    animation: rise 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    transition: box-shadow 0.2s;
  }
  .card:hover {
    box-shadow: var(--shadow-2);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Single result ---------- */
  .result-grid {
    display: grid;
    grid-template-columns: 300px 1fr;
  }
  .thumb-box {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
  }
  .thumb-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .duration-pill {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.78);
    color: white; font-size: 12px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
    font-family: "Roboto Mono", monospace;
  }

  .result-body { padding: 20px 24px; display: flex; flex-direction: column; }
  .source-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px; border-radius: 12px;
    background: var(--surface-2);
    color: var(--muted);
    margin-bottom: 10px;
    width: fit-content;
    line-height: 1.4;
  }
  .source-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .source-pill .arrow { color: var(--dim); }
  .matched-note {
    font-size: 12px; color: var(--muted);
    background: var(--accent-soft);
    border-radius: var(--radius-xs);
    padding: 8px 12px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .result-body h2 {
    font-family: "Google Sans", sans-serif;
    font-size: 20px; font-weight: 500;
    line-height: 1.3; letter-spacing: -0.01em;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 4px 16px;
    color: var(--muted); font-size: 13px;
    margin-bottom: 16px;
  }
  .meta-row .item { display: flex; align-items: center; gap: 5px; }

  /* ---------- Form controls ---------- */
  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 11px; font-weight: 500;
    color: var(--muted); letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .seg {
    display: inline-flex; gap: 2px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 2px;
    width: fit-content;
  }
  .seg button {
    border: none; cursor: pointer; background: transparent;
    color: var(--muted); font-family: inherit; font-weight: 500;
    font-size: 13px; padding: 7px 14px;
    border-radius: var(--radius-xs);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .seg button svg { width: 14px; height: 14px; }
  .seg button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-1);
  }

  /* Native select styled clean */
  .select {
    position: relative;
    width: 100%;
  }
  .select select {
    width: 100%;
    appearance: none; -webkit-appearance: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit; font-size: 14px;
    padding: 9px 36px 9px 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .select select:hover { border-color: var(--accent); }
  .select select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .select::after {
    content: "";
    position: absolute; right: 14px; top: 50%;
    width: 7px; height: 7px;
    border-right: 1.6px solid var(--muted);
    border-bottom: 1.6px solid var(--muted);
    transform: translateY(-65%) rotate(45deg);
    pointer-events: none;
  }

  /* ---------- Download bar ---------- */
  .dl-bar {
    display: flex; align-items: center; gap: 12px;
    padding-top: 14px;
    border-top: 1px solid var(--border-light);
    margin-top: auto;
  }
  .dl-info { flex: 1; font-size: 13px; color: var(--muted); line-height: 1.4; }
  .dl-info b { color: var(--text); font-weight: 500; }
  .btn-dl {
    border: none; cursor: pointer;
    font-family: "Google Sans", sans-serif;
    font-weight: 500; font-size: 14px;
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    color: white;
    background: var(--accent);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .btn-dl:hover { background: var(--accent-hover); box-shadow: var(--shadow-1); }
  .btn-dl:disabled { opacity: 0.5; cursor: default; }

  /* ---------- Download result (file ready) ---------- */
  .dl-result {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    display: flex; flex-direction: column; gap: 10px;
    animation: rise 0.2s ease;
  }
  .dl-result.success { background: var(--ok-soft); border: 1px solid #ceead6; }
  .dl-result.error { background: var(--danger-soft); border: 1px solid #f5c6cb; }
  .dl-result-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .dl-result-row .file-name {
    font-weight: 500; font-size: 14px; color: var(--text);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dl-result-row .file-size {
    font-size: 12px; color: var(--muted);
    font-family: "Roboto Mono", monospace;
  }
  .dl-result-row .file-ttl {
    font-size: 11px; color: var(--warn);
  }
  .dl-result-actions {
    display: flex; gap: 8px;
  }
  .btn-sm {
    border: none; cursor: pointer;
    font-family: "Google Sans", sans-serif;
    font-weight: 500; font-size: 13px;
    padding: 7px 16px;
    border-radius: var(--radius-xs);
    color: var(--accent);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--surface-2); border-color: var(--accent); }
  .btn-sm svg { width: 14px; height: 14px; }
  .btn-sm.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .btn-sm.primary:hover { background: var(--accent-hover); }

  /* ---------- Multi-item ---------- */
  .multi-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
  }
  .multi-head h3 {
    font-family: "Google Sans", sans-serif;
    font-size: 18px; font-weight: 500;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .multi-count {
    font-size: 12px; color: var(--muted);
    background: var(--surface-2);
    padding: 3px 8px; border-radius: 10px;
    font-weight: 500;
  }
  .btn-link {
    border: none; cursor: pointer; background: transparent;
    color: var(--accent); font-family: inherit; font-weight: 500;
    font-size: 13px; padding: 6px 12px; border-radius: var(--radius-sm);
    transition: background 0.15s;
  }
  .btn-link:hover { background: var(--surface-2); }

  .multi-options {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    display: grid; grid-template-columns: auto 1fr; gap: 10px 24px; align-items: center;
  }
  .multi-options .field { flex-direction: row; align-items: center; gap: 10px; }
  .multi-options .field-label { margin: 0; }

  .item-list { max-height: 400px; overflow-y: auto; }
  .item-list::-webkit-scrollbar { width: 8px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
  .item-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .item-row:hover { background: var(--surface-2); }
  .item-row.unavailable { opacity: 0.45; cursor: default; }
  .item-row.unavailable .item-title::after {
    content: " — no match"; color: var(--danger); font-size: 11px; font-weight: 500;
  }
  .item-check {
    width: 18px; height: 18px; border-radius: 3px;
    border: 2px solid var(--border);
    flex-shrink: 0; display: grid; place-items: center;
    transition: all 0.12s; color: transparent; font-size: 11px;
  }
  .item-check.checked {
    border-color: var(--accent); background: var(--accent); color: white;
  }
  .item-thumb {
    width: 40px; height: 40px; border-radius: var(--radius-xs);
    background: var(--surface-2); overflow: hidden; flex-shrink: 0;
  }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item-info { flex: 1; min-width: 0; }
  .item-title {
    font-size: 14px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-sub {
    font-size: 12px; color: var(--muted); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-dur {
    font-size: 12px; color: var(--dim);
    font-family: "Roboto Mono", monospace;
    flex-shrink: 0;
  }

  .multi-foot {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    border-top: 1px solid var(--border-light);
  }
  .selected-count { font-size: 13px; color: var(--muted); flex: 1; }
  .btn-primary {
    border: none; cursor: pointer;
    font-family: "Google Sans", sans-serif;
    font-weight: 500; font-size: 14px;
    padding: 10px 20px; border-radius: var(--radius-sm);
    color: white; background: var(--accent);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-1); }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }

  /* ---------- Download Progress UI ---------- */
  .dl-progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
  }
  .dl-progress-step {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.01em;
  }
  .dl-progress-bar {
    width: 100%;
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .dl-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #4dabf7);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .dl-progress-fill.indeterminate {
    width: 40%;
    animation: dl-progress-indeterminate 1.8s ease-in-out infinite;
  }
  @keyframes dl-progress-indeterminate {
    0% { margin-left: -30%; width: 40%; }
    50% { margin-left: 40%; width: 50%; }
    100% { margin-left: 100%; width: 40%; }
  }
  .dl-progress-meta {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--dim);
    font-family: "Roboto Mono", monospace;
  }
  .dl-progress-pct {
    font-weight: 600;
    color: var(--text-2);
    min-width: 32px;
  }
  .dl-progress-speed {
    color: var(--muted);
  }
  .dl-progress-eta {
    color: var(--muted);
    margin-left: auto;
  }
  .dl-complete {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ok);
    font-weight: 500;
    animation: rise 0.3s ease;
  }
  .dl-complete .dl-filename {
    color: var(--text);
    font-weight: 400;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }
  .dl-complete .dl-filesize {
    color: var(--dim);
    font-family: "Roboto Mono", monospace;
    font-size: 11px;
  }
  .dl-error {
    font-size: 13px;
    color: var(--danger);
    font-weight: 500;
  }

  /* ---------- Legacy progress-bar (keep for reuse) ---------- */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--surface-2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-bar .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    animation: progress-indeterminate 1.5s ease-in-out infinite;
  }
  @keyframes progress-indeterminate {
    0% { width: 0%; margin-left: 0%; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* ---------- Skeleton ---------- */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .skel-grid {
    display: grid;
    grid-template-columns: 300px 1fr;
  }
  .skel-thumb {
    aspect-ratio: 16 / 9;
    background: var(--surface-2);
  }
  .skel-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .skel {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 37%, var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -100% 0; } }
  .skel-pill { height: 22px; width: 90px; }
  .skel-title { height: 20px; width: 80%; }
  .skel-title.short { width: 50%; }
  .skel-meta { height: 14px; width: 40%; }
  .skel-line { height: 14px; margin-bottom: 8px; }
  .skel-line.short { width: 50%; }
  .skel-bar { height: 36px; margin-top: auto; }

  /* ---------- Focus visible ---------- */
  button:focus-visible, select:focus-visible, a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ---------- Footer ---------- */
  footer {
    text-align: center; margin-top: 48px;
    color: var(--dim); font-size: 13px; line-height: 1.7;
  }
  footer code {
    font-family: "Roboto Mono", monospace;
    color: var(--muted);
    background: var(--surface-2);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 720px) {
    .topbar { padding: 0 16px; gap: 10px; }
    .brand span { display: none; }
    .topbar-end { display: none; }
    .result-grid, .skel-grid { grid-template-columns: 1fr; }
    .multi-options { grid-template-columns: 1fr; }
    .multi-options .field { flex-direction: column; align-items: stretch; }
    .container { padding: 20px 16px 60px; }
    .empty-state { padding: 48px 16px 32px; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <span>Grab</span>
    </div>
    <form class="topbar-search" id="searchForm">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="urlInput" type="text" placeholder="Paste a link — YouTube, Spotify, Instagram…" autocomplete="off" spellcheck="false" />
